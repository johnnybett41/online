services:
  - type: web
    name: online-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_PATH
        value: /opt/render/project/src/data/database.db
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
  - type: web
    name: online-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: online-backend
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_GOOGLE_CLIENT_ID
        fromService:
          name: online-backend
          type: web
          envVarKey: GOOGLE_CLIENT_ID
