<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ElectroHub dark logo</title>
  <desc id="desc">A dark-mode version of the ElectroHub mark with a brighter, more dimensional bolt on a light card.</desc>
  <defs>
    <linearGradient id="bg" x1="70" y1="58" x2="442" y2="452" gradientUnits="userSpaceOnUse">
